version: '3.8'

services:
  # 1. Contêiner da Base de Dados (PostgreSQL)
  db:
    build: 
      context: ./DATABASE
      dockerfile: Dockerfile
    container_name: abp_database
    restart: always
    environment:
      POSTGRES_USER: admin_abp
      POSTGRES_PASSWORD: abp_secure_password
      POSTGRES_DB: abp_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - abp_network
    # ADICIONADO: Healthcheck para garantir que o banco está pronto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_abp -d abp_leads"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Contêiner do Backend (Node.js + Prisma)
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: abp_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # ADICIONADO: Só inicia se o DB estiver "healthy"
    environment:
      DATABASE_URL: "postgresql://admin_abp:abp_secure_password@db:5432/abp_leads?schema=public"
      JWT_SECRET: "chave-super-secreta-para-jwt-mudar-em-producao"
      PORT: 3333
    ports:
      - "3333:3333"
    networks:
      - abp_network

  # 3. Contêiner do Frontend (React + Vite)
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: abp_frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:3333"
    ports:
      - "5173:5173"
    networks:
      - abp_network

volumes:
  pgdata:

networks:
  abp_network:
    driver: bridge